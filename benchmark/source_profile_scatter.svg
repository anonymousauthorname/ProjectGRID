<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark source profile scatter</title>
  <desc id="desc">Average article tokens versus average ground-truth edges for the five benchmark sources.</desc>
  <rect width="760" height="420" fill="#fbfaf6"/>
  <text x="34" y="34" font-family="Georgia, serif" font-size="23" fill="#1f2937">Benchmark Source Profile</text>
  <text x="34" y="56" font-family="Georgia, serif" font-size="12" fill="#6b7280">x-axis: average article tokens, y-axis: average ground-truth edges</text>

  <line x1="90" y1="340" x2="700" y2="340" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="90" y1="340" x2="90" y2="90" stroke="#cbd5e1" stroke-width="1.5"/>

  <text x="90" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">0</text>
  <text x="212" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">2.5k</text>
  <text x="334" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">5k</text>
  <text x="456" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">7.5k</text>
  <text x="578" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">10k</text>
  <text x="700" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6b7280">12.5k</text>

  <text x="72" y="340" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6b7280">0</text>
  <text x="72" y="276" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6b7280">20</text>
  <text x="72" y="212" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6b7280">40</text>
  <text x="72" y="148" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6b7280">60</text>
  <text x="72" y="94" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6b7280">80</text>

  <text x="395" y="392" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2937">Average tokens per article</text>
  <text x="22" y="220" transform="rotate(-90 22,220)" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1f2937">Average ground-truth edges</text>

  <circle cx="143.8" cy="290.9" r="8" fill="#2c7a7b"/>
  <text x="156.8" y="286.9" font-family="Georgia, serif" font-size="12" fill="#1f2937">GRID</text>

  <circle cx="116.2" cy="314.6" r="7" fill="#5c8d89"/>
  <text x="129.2" y="310.6" font-family="Georgia, serif" font-size="12" fill="#1f2937">CASIE</text>

  <circle cx="99.3" cy="302.2" r="7" fill="#7a9e7e"/>
  <text x="112.3" y="298.2" font-family="Georgia, serif" font-size="12" fill="#1f2937">CTINexus</text>

  <circle cx="413.7" cy="183.5" r="9" fill="#c08a3e"/>
  <text x="426.7" y="179.5" font-family="Georgia, serif" font-size="12" fill="#1f2937">MalKG</text>

  <circle cx="626.8" cy="120.3" r="10" fill="#b4513d"/>
  <text x="639.8" y="116.3" font-family="Georgia, serif" font-size="12" fill="#1f2937">SecureNLP</text>
</svg>
